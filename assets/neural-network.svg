<svg width="3800" height="1800" viewBox="0 0 3800 1800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neural-glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="node-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2D84C7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#043263;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background - now covers full dimensions -->
  <rect width="3800" height="1800" fill="#0d1117"/>
  
  <!-- Neural Network Layers - Scaled up and repositioned -->
  <g transform="translate(600,300) scale(4)">
    <!-- Layer 1 - Input Layer (3 nodes) -->
    <g class="layer" data-layer="1">
      <circle cx="50" cy="100" r="15" fill="url(#node-gradient)" filter="url(#neural-glow)"/>
      <circle cx="50" cy="160" r="15" fill="url(#node-gradient)" filter="url(#neural-glow)"/>
      <circle cx="50" cy="220" r="15" fill="url(#node-gradient)" filter="url(#neural-glow)"/>
    </g>
    
    <!-- Layer 2 - Hidden Layer (4 nodes) -->
    <g class="layer" data-layer="2">
      <circle cx="200" cy="70" r="15" fill="url(#node-gradient)" filter="url(#neural-glow)"/>
      <circle cx="200" cy="130" r="15" fill="url(#node-gradient)" filter="url(#neural-glow)"/>
      <circle cx="200" cy="190" r="15" fill="url(#node-gradient)" filter="url(#neural-glow)"/>
      <circle cx="200" cy="250" r="15" fill="url(#node-gradient)" filter="url(#neural-glow)"/>
    </g>
    
    <!-- Layer 3 - Hidden Layer (4 nodes) -->
    <g class="layer" data-layer="3">
      <circle cx="350" cy="70" r="15" fill="url(#node-gradient)" filter="url(#neural-glow)"/>
      <circle cx="350" cy="130" r="15" fill="url(#node-gradient)" filter="url(#neural-glow)"/>
      <circle cx="350" cy="190" r="15" fill="url(#node-gradient)" filter="url(#neural-glow)"/>
      <circle cx="350" cy="250" r="15" fill="url(#node-gradient)" filter="url(#neural-glow)"/>
    </g>
    
    <!-- Layer 4 - Output Layer (2 nodes) -->
    <g class="layer" data-layer="4">
      <circle cx="500" cy="130" r="15" fill="url(#node-gradient)" filter="url(#neural-glow)"/>
      <circle cx="500" cy="190" r="15" fill="url(#node-gradient)" filter="url(#neural-glow)"/>
    </g>
    
    <!-- Connections between layers -->
    <line x1="65" y1="100" x2="185" y2="70" stroke="#2D84C7" stroke-width="2" opacity="0.3"/>
    <line x1="65" y1="160" x2="185" y2="130" stroke="#2D84C7" stroke-width="2" opacity="0.3"/>
    <line x1="65" y1="220" x2="185" y2="190" stroke="#2D84C7" stroke-width="2" opacity="0.3"/>
    
    <!-- Animated data particles -->
    <circle r="6" fill="#fff" filter="url(#neural-glow)">
      <animateMotion dur="3s" repeatCount="indefinite" path="M65,100 L185,70"/>
    </circle>
    <circle r="6" fill="#fff" filter="url(#neural-glow)">
      <animateMotion dur="2.5s" repeatCount="indefinite" path="M65,160 L185,130"/>
    </circle>
    <circle r="6" fill="#fff" filter="url(#neural-glow)">
      <animateMotion dur="3.5s" repeatCount="indefinite" path="M65,220 L185,190"/>
    </circle>
    
    <!-- Layer 2 to Layer 3 connections -->
    <line x1="215" y1="70" x2="335" y2="70" stroke="#043263" stroke-width="2" opacity="0.3"/>
    <line x1="215" y1="130" x2="335" y2="130" stroke="#043263" stroke-width="2" opacity="0.3"/>
    
    <!-- More animated particles -->
    <circle r="5" fill="#2D84C7">
      <animateMotion dur="2s" repeatCount="indefinite" path="M215,70 L335,70"/>
    </circle>
  </g>
  
  <!-- Status text - Repositioned for new dimensions -->
  <text x="2000" y="700" font-family="monospace" font-size="48" fill="#2D84C7" font-weight="bold">
    Processing: Python 47%
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="2000" y="800" font-family="monospace" font-size="42" fill="#8b949e">
    JavaScript 32%
  </text>
  <text x="2000" y="900" font-family="monospace" font-size="42" fill="#8b949e">
    Java 21%
  </text>
  
  <!-- Neural activity indicator - Larger and centered -->
  <text x="1900" y="1200" font-family="monospace" font-size="60" fill="#2D84C7" text-anchor="middle" font-weight="bold">
    ⚡ Neural Activity: HIGH ⚡
    <animate attributeName="fill" values="#2D84C7;#043263;#2D84C7" dur="3s" repeatCount="indefinite"/>
  </text>
  
  <!-- Bottom description -->
  <text x="1900" y="1500" font-family="monospace" font-size="36" fill="#2D84C7" text-anchor="middle">
    🧬 Based on languages & commit frequency
  </text>
</svg>
