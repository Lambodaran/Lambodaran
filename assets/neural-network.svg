<svg width="3800" height="1000" viewBox="0 0 3800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="node-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2D84C7"/>
      <stop offset="100%" stop-color="#043263"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="3800" height="1000" fill="#0d1117"/>
  
  <!-- Neural Network Layers -->
  <g transform="translate(600,200)">
    <!-- Layer 1 - Input Layer (3 nodes) -->
    <circle cx="140" cy="200" r="40" fill="url(#node-gradient)"/>
    <circle cx="140" cy="350" r="40" fill="url(#node-gradient)"/>
    <circle cx="140" cy="500" r="40" fill="url(#node-gradient)"/>
    
    <!-- Layer 2 - Hidden Layer (4 nodes) -->
    <circle cx="560" cy="100" r="40" fill="url(#node-gradient)"/>
    <circle cx="560" cy="275" r="40" fill="url(#node-gradient)"/>
    <circle cx="560" cy="450" r="40" fill="url(#node-gradient)"/>
    <circle cx="560" cy="625" r="40" fill="url(#node-gradient)"/>
    
    <!-- Layer 3 - Hidden Layer (4 nodes) -->
    <circle cx="980" cy="100" r="40" fill="url(#node-gradient)"/>
    <circle cx="980" cy="275" r="40" fill="url(#node-gradient)"/>
    <circle cx="980" cy="450" r="40" fill="url(#node-gradient)"/>
    <circle cx="980" cy="625" r="40" fill="url(#node-gradient)"/>
    
    <!-- Layer 4 - Output Layer (2 nodes) -->
    <circle cx="1400" cy="275" r="40" fill="url(#node-gradient)"/>
    <circle cx="1400" cy="450" r="40" fill="url(#node-gradient)"/>
    
    <!-- Connection lines -->
    <line x1="180" y1="225" x2="520" y2="125" stroke="#2D84C7" stroke-width="3" opacity="0.3"/>
    <line x1="180" y1="375" x2="520" y2="300" stroke="#2D84C7" stroke-width="3" opacity="0.3"/>
    <line x1="180" y1="525" x2="520" y2="475" stroke="#2D84C7" stroke-width="3" opacity="0.3"/>
    
    <line x1="600" y1="125" x2="940" y2="125" stroke="#2D84C7" stroke-width="3" opacity="0.3"/>
    <line x1="600" y1="300" x2="940" y2="300" stroke="#2D84C7" stroke-width="3" opacity="0.3"/>
  </g>
  
  <!-- Status Text -->
  <text x="2000" y="300" font-family="Arial, sans-serif" font-size="48" fill="#2D84C7" font-weight="bold">
    Processing: Python 47%
  </text>
  <text x="2000" y="400" font-family="Arial, sans-serif" font-size="42" fill="#8b949e">
    JavaScript 32%
  </text>
  <text x="2000" y="500" font-family="Arial, sans-serif" font-size="42" fill="#8b949e">
    Java 21%
  </text>
  
  <!-- Neural Activity Indicator -->
  <text x="1900" y="700" font-family="Arial, sans-serif" font-size="60" fill="#2D84C7" text-anchor="middle" font-weight="bold">
    ⚡ Neural Activity: HIGH ⚡
  </text>
  
  <!-- Bottom Description -->
  <text x="1900" y="850" font-family="Arial, sans-serif" font-size="32" fill="#2D84C7" text-anchor="middle">
    • Based on languages & commit frequency •
  </text>
</svg>
