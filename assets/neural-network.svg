<svg width="3800" height="1800" viewBox="0 0 3800 1800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="node-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2D84C7"/>
      <stop offset="100%" stop-color="#043263"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="3800" height="1800" fill="#0d1117"/>
  
  <!-- Neural Network Layers -->
  <g transform="translate(600,300)">
    <!-- Layer 1 -->
    <circle cx="200" cy="400" r="60" fill="url(#node-gradient)"/>
    <circle cx="200" cy="600" r="60" fill="url(#node-gradient)"/>
    <circle cx="200" cy="800" r="60" fill="url(#node-gradient)"/>
    
    <!-- Layer 2 -->
    <circle cx="800" cy="200" r="60" fill="url(#node-gradient)"/>
    <circle cx="800" cy="450" r="60" fill="url(#node-gradient)"/>
    <circle cx="800" cy="700" r="60" fill="url(#node-gradient)"/>
    <circle cx="800" cy="950" r="60" fill="url(#node-gradient)"/>
    
    <!-- Layer 3 -->
    <circle cx="1400" cy="200" r="60" fill="url(#node-gradient)"/>
    <circle cx="1400" cy="450" r="60" fill="url(#node-gradient)"/>
    <circle cx="1400" cy="700" r="60" fill="url(#node-gradient)"/>
    <circle cx="1400" cy="950" r="60" fill="url(#node-gradient)"/>
    
    <!-- Layer 4 -->
    <circle cx="2000" cy="450" r="60" fill="url(#node-gradient)"/>
    <circle cx="2000" cy="700" r="60" fill="url(#node-gradient)"/>
    
    <!-- Connection lines -->
    <line x1="260" y1="430" x2="740" y2="230" stroke="#2D84C7" stroke-width="4" opacity="0.3"/>
    <line x1="260" y1="630" x2="740" y2="480" stroke="#2D84C7" stroke-width="4" opacity="0.3"/>
    <line x1="260" y1="830" x2="740" y2="730" stroke="#2D84C7" stroke-width="4" opacity="0.3"/>
  </g>
  
  <!-- Status Text -->
  <text x="2500" y="500" font-family="Arial, sans-serif" font-size="60" fill="#2D84C7" font-weight="bold">
    Processing: Python 47%
  </text>
  <text x="2500" y="600" font-family="Arial, sans-serif" font-size="54" fill="#8b949e">
    JavaScript 32%
  </text>
  <text x="2500" y="700" font-family="Arial, sans-serif" font-size="54" fill="#8b949e">
    Java 21%
  </text>
  
  <!-- Neural Activity -->
  <text x="1900" y="1200" font-family="Arial, sans-serif" font-size="72" fill="#2D84C7" text-anchor="middle" font-weight="bold">
    ⚡ Neural Activity: HIGH ⚡
  </text>
  
  <!-- Description -->
  <text x="1900" y="1500" font-family="Arial, sans-serif" font-size="40" fill="#2D84C7" text-anchor="middle">
    • Based on languages & commit frequency •
  </text>
</svg>
