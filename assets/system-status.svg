<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2D84C7;stop-opacity:1">
        <animate attributeName="stop-color" values="#2D84C7;#043263;#2D84C7" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#043263;stop-opacity:1">
        <animate attributeName="stop-color" values="#043263;#2D84C7;#043263" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  
  <!-- Main window frame -->
  <rect x="50" y="20" width="700" height="160" rx="15" fill="#0d1117" stroke="url(#neon)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Window header -->
  <rect x="50" y="20" width="700" height="35" rx="15" fill="#1a1e24" stroke="url(#neon)" stroke-width="2"/>
  <circle cx="90" cy="38" r="8" fill="#ff5f56"/>
  <circle cx="120" cy="38" r="8" fill="#ffbd2e"/>
  <circle cx="150" cy="38" r="8" fill="#27c93f"/>
  <text x="400" y="45" font-family="monospace" font-size="16" fill="url(#neon)" text-anchor="middle">SYSTEM PLAYER v2.0</text>
  
  <!-- Player stats -->
  <text x="150" y="90" font-family="monospace" font-size="20" fill="#2D84C7">PLAYER: Lambodaran</text>
  <text x="550" y="90" font-family="monospace" font-size="20" fill="#2D84C7">LEVEL: 42</text>
  
  <text x="150" y="130" font-family="monospace" font-size="16" fill="#8b949e">EXP: 12,450/15,000</text>
  <text x="550" y="130" font-family="monospace" font-size="16" fill="#8b949e">HP: 100%</text>
  
  <!-- EXP Bar -->
  <rect x="150" y="145" width="200" height="15" fill="#1f2937" rx="7"/>
  <rect x="150" y="145" width="166" height="15" fill="url(#neon)" rx="7">
    <animate attributeName="width" values="160;166;160" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Floating animation -->
  <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3s" repeatCount="indefinite"/>
</svg>
